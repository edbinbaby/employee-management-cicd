<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Employee</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

.container{
    width:500px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

a{
    display:block;
    text-align:center;
    margin-top:20px;
}
</style>

</head>

<body>

<div class="container">

<h2>Add Employee</h2>

<form onsubmit="saveEmployee(); return false;">

<input type="text" placeholder="Employee ID" required>

<input type="text" placeholder="Employee Name" required>

<input type="email" placeholder="Email" required>

<select required>
<option>IT</option>
<option>HR</option>
<option>Finance</option>
<option>Sales</option>
</select>

<input type="number" placeholder="Salary" required>

<button>Add Employee</button>

</form>

<a href="dashboard.html">Back to Dashboard</a>

</div>

<script>
function saveEmployee(){
    alert("Employee Added Successfully!");
}
</script>

</body>
</html>
