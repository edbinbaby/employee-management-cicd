<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees</title>

    <style>
        body{
            font-family:Arial,sans-serif;
            background:#f4f4f4;
            margin:0;
            padding:20px;
        }

        h1{
            text-align:center;
            color:#333;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
            background:white;
        }

        th,td{
            border:1px solid #ddd;
            padding:12px;
            text-align:center;
        }

        th{
            background:#007BFF;
            color:white;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

        .btn{
            display:inline-block;
            padding:10px 20px;
            background:#007BFF;
            color:white;
            text-decoration:none;
            border-radius:5px;
            margin-top:20px;
        }

        .btn:hover{
            background:#0056b3;
        }
    </style>
</head>

<body>

<h1>Employee List</h1>

<table>

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Department</th>
    <th>Email</th>
</tr>

    <td>EMP001</td>

</tr>

</tr>

</html>
