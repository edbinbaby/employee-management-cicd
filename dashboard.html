<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Employee Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f7fb;
}

.header{
    background:#007BFF;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    margin:30px auto;
}

.cards{
    display:flex;
    gap:20px;
    margin-bottom:30px;
}

.card{
    flex:1;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    text-align:center;
}

.card h2{
    color:#007BFF;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

a{
    text-decoration:none;
}

.btn{
    background:#007BFF;
    color:white;
    padding:18px;
    text-align:center;
    border-radius:8px;
    font-size:18px;
}

.btn:hover{
    background:#0056b3;
}

</style>

</head>

<body>

<div class="header">

<h1>Employee Management Dashboard</h1>

<p>Welcome Admin</p>

</div>

<div class="container">

<div class="cards">

<div class="card">
<h2>120</h2>
<p>Total Employees</p>
</div>

<div class="card">
<h2>5</h2>
<p>Departments</p>
</div>

<div class="card">
<h2>115</h2>
<p>Attendance Today</p>
</div>

</div>

<div class="buttons">

<a href="employees.html"><div class="btn">Employee List</div></a>

<a href="add-employee.html"><div class="btn">Add Employee</div></a>

<a href="attendance.html"><div class="btn">Attendance</div></a>

<a href="leave.html"><div class="btn">Leave</div></a>

<a href="departments.html"><div class="btn">Departments</div></a>

<a href="login.html"><div class="btn">Logout</div></a>

<a href="salary.html"><div class="btn">Salary</div></a>

<a href="profile.html"><div class="btn">Profile</div></a>

<a href="settings.html"><div class="btn">Settings</div></a>

<a href="reports.html"><div class="btn">Reports</div></a>

</div>

</div>

<footer style="text-align:center;padding:20px;background:#007BFF;color:white;margin-top:30px;">
Employee Management System | Version 1.0 | Developed by Edbin Baby
</footer>

</body>
</html>
