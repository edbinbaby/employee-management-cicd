<!DOCTYPE html>
<html>
<head>
<title>Departments</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:40px;
}

h1{
    text-align:center;
}

.container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-top:30px;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.card h2{
    color:#007BFF;
}

a{
    display:inline-block;
    margin-top:30px;
    padding:12px 20px;
    background:#007BFF;
    color:white;
    text-decoration:none;
    border-radius:5px;
}
</style>

</head>

<body>

<h1>Departments</h1>

<div class="container">

<div class="card">
<h2>IT</h2>
<p>25 Employees</p>
</div>

<div class="card">
<h2>HR</h2>
<p>10 Employees</p>
</div>

<div class="card">
<h2>Finance</h2>
<p>15 Employees</p>
</div>

<div class="card">
<h2>Sales</h2>
<p>30 Employees</p>
</div>

<div class="card">
<h2>Marketing</h2>
<p>20 Employees</p>
</div>

<div class="card">
<h2>Support</h2>
<p>20 Employees</p>
</div>

</div>

<br>

<a href="dashboard.html">Back to Dashboard</a>

</body>
</html>
