<!DOCTYPE html>
<html>
<head>
<title>Settings</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:40px;
}

.container{
    width:500px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}

h1{
    text-align:center;
}

label{
    display:block;
    margin-top:15px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
}

a{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:#007BFF;
}
</style>

</head>

<body>

<div class="container">

<h1>Settings</h1>

<label>Change Username</label>
<input type="text" placeholder="New Username">

<label>Change Password</label>
<input type="password" placeholder="New Password">

<button>Save Changes</button>

<br><br>

<a href="dashboard.html">Back to Dashboard</a>

</div>

</body>
</html>
